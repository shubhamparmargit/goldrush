{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
	{% include "portal/includes/head.html" %}
</head>

<body class="hold-transition theme-primary bg-img">
	<div class="container h-p100">
		<div class="row align-items-center justify-content-md-center h-p100">
			<div class="col-12">
				<div class="row justify-content-center no-gutters">
					<div class="col-lg-8 col-md-8 col-12">
						<div class="bg-white rounded30 shadow-lg">
							<div class="row">
								<div class="col-lg-5 col-md-5 col-12"
									style="display: flex; flex-direction: column; justify-content: space-around;">
									<div class="p-5 mb-3">
										<img src="{% static 'website/images/goldrush.png' %}">
									</div>
								</div>
								<div class="col-lg-7 col-md-7 col-12 data">
									{% if context.is_valid %}
									<div class="content-top-agile p-20 pb-0">
										<h2 class="text-purple">Set a new password!</h2>
										<p class="mb-0">Please enter your new password twice so we can verify you typed
											it in correctly.</p>
										<p style="color: red;"></p>
									</div>
									<div class="p-40">
										<form action="#" method="post" name="frm_set_password" id="frm_set_password">
											{% csrf_token %}
											<input type="hidden" name="unique_id" value="{{ context.unique_id }}">
											<div class="form-group">
												<div class="input-group mb-3">
													<div class="input-group-prepend">
														<span class="input-group-text bg-transparent"><i
																class="ti-lock"></i></span>
													</div>
													<input type="password" class="form-control pl-15" id="password"
														name="password" placeholder="New Password" required>
												</div>
											</div>
											<div class="form-group">
												<div class="input-group mb-3">
													<div class="input-group-prepend">
														<span class="input-group-text bg-transparent"><i
																class="ti-lock"></i></span>
													</div>
													<input type="password" class="form-control pl-15"
														id="confirm_password" name="confirm_password"
														placeholder="Confirm Password" required>
												</div>
											</div>
											<div class="row">
												<div class="col-6">
													<div class="checkbox">
														<input type="checkbox" id="reveal">
														<label for="reveal">Show Password</label>
													</div>
												</div>
												<div class="col-6">
													
												</div>
												<div class="col-12 text-center">
													<button type="submit" class="btn btn-danger mt-10"
														name="btn_set_password" id="btn_set_password">
														<span class="indicator-label">Change my password</span>
														<span class="indicator-progress">Please wait...
															<span
																class="spinner-border spinner-border-sm align-middle ms-2"></span></span>
													</button>
												</div>
												<!-- /.col -->
											</div>
										</form>
									</div>
									{% else %}
									<div class="content-top-agile pt-50 p-20 pb-50">
										<h2 style="color: red;">Error!</h2>
										<p class="mb-0">{{context.message}}</p>
									</div>
									{% endif %}
								</div>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>
	<script>
		document.cookie = "jsEnabled=true; path=/";
		// window.location.href = "/login";
	</script>
	<script src="{% static 'portal/js/vendors.min.js' %}"></script>
	<script src="{% static 'portal/js/pages/chat-popup.js' %}"></script>
	<script src="{% static 'portal/assets/icons/feather-icons/feather.min.js' %}"></script>
	<script type="text/javascript" src="{% static 'portal/js/validation/jquery.validate.min.js' %}"></script>
	<script src="{% static 'portal/js/validation/jquery.form.min.js' %}"></script>
	<script>
		var set_new_password = "{% url 'set_new_customer_password' %}";
	</script>
	<script src="{% static 'portal/js/action/auth.js' %}"></script>
	<script
		src="{% static 'portal/assets/vendor_components/jquery-toast-plugin-master/src/jquery.toast.js' %}"></script>
</body>

</html>
