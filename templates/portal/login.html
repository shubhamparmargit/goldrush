{% load static %}
<!DOCTYPE html>
<html lang="en">
	<head>
		{% include "portal/includes/head.html" %}
	</head>
	<body class="hold-transition theme-primary bg-img" style="background-image: url()">
		<div class="container h-p100">
			<div class="row align-items-center justify-content-md-center h-p100">	
				<div class="col-12">
					<div class="row justify-content-center no-gutters">
						<div class="col-lg-5 col-md-5 col-12">
							<!-- <div class="p-20">
								<img src="{% static 'portal/img/logo/finsecure.png' %}">
							</div> -->
							<div class="bg-white rounded30 shadow-lg">
								<div class="content-top-agile p-20 pb-0">
									<img src="{% static 'website/images/goldrush.png' %}" width="300">
									<h3 class="mt-15">Let's Get Started</h3>
									<p class="text-muted">
										Sign in to continue.
									</p>
								</div>
								<div class="p-40">
									<form action="#" method="post" name="frm_login" id="frm_login">
										{% csrf_token %}
										<div class="form-group">
											<div class="input-group mb-3">
												<div class="input-group-prepend">
													<span class="input-group-text bg-transparent"><i class="ti-user"></i></span>
												</div>
												<input type="text" class="form-control pl-15 bg-transparent" name="username" id="username" placeholder="Enter your 10 digit mobile number">
											</div>
										</div>
										<div class="form-group">
											<div class="input-group mb-3">
												<div class="input-group-prepend">
													<span class="input-group-text  bg-transparent"><i class="ti-lock"></i></span>
												</div>
												<input type="password" class="form-control pl-15 bg-transparent" name="password" id="password" placeholder="Password">
											</div>
										</div>
										<div class="row">
											<div class="col-6">
												<div class="checkbox">
													<input type="checkbox" id="reveal">
													<label for="reveal">Show Password</label>
												</div>
											</div>
											<div class="col-6">
												<div class="fog-pwd pull-right">
													<a href="{% url 'password_reset' %}" class="hover-warning"><i class="fa fa-lock"></i> Forgot password?</a><br>
												</div>
											</div>
											<div class="col-12 text-center">
												<button type="submit" class="btn btn-danger mt-10" name="btn_login" id="btn_login">
													<span class="indicator-label">SIGN IN</span>
													<span class="indicator-progress">Please wait... 
													<span class="spinner-border spinner-border-sm align-middle ms-2"></span></span>
												</button>
											</div>
											<!-- /.col -->
										</div>
									</form>	
								</div>						
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
		<script>
			document.cookie = "jsEnabled=true; path=/";
			// window.location.href = "/login";
		</script>
		<script src="{% static 'portal/js/vendors.min.js' %}"></script>
		<script src="{% static 'portal/js/pages/chat-popup.js' %}"></script>
		<script src="{% static 'portal/assets/icons/feather-icons/feather.min.js' %}"></script>
		<script type="text/javascript" src="{% static 'portal/js/validation/jquery.validate.min.js' %}"></script>
		<script src="{% static 'portal/js/validation/jquery.form.min.js' %}"></script>	
		<script>
			var path = "{% url 'auth_login' %}";
		</script>
		<script src="{% static 'portal/js/action/auth.js' %}"></script>
		<script src="{% static 'portal/assets/vendor_components/jquery-toast-plugin-master/src/jquery.toast.js' %}"></script>
	</body>
</html>
