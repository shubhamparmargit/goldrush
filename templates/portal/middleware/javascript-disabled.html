{% load static %}
<!DOCTYPE html>
<html lang="en">
	<head>
		{% include "includes/head.html" %}
		{% block extraCSS %}{% endblock %}
	</head>
	<body class="hold-transition theme-primary bg-img" style="background-image: url('{% static "img/bg.jpg" %}')">
		<section class="error-page h-p100">
			<div class="container h-p100">
				<div class="row h-p100 align-items-center justify-content-center text-center">
					<div class="col-lg-7 col-md-10 col-12">
						<div class="rounded30 p-50">
							<h1 class="fs-180 fw-bold error-page-title"> <i class="fa fa-gear fa-spin"></i></h1>
							<h1>JavaScript Disabled</h1>
							<h3>JavaScript is required to use this site.</h3>
							<h4>Please enable JavaScript in your browser and try again.</h4>
						</div>
					</div>
				</div>
			</div>
		</section>
		<script>
			// JS enable hote hi
			const params = new URLSearchParams(window.location.search);
			const nextUrl = params.get("next") || "/";
			window.location.href = nextUrl;
		</script>
	</body>
</html>
