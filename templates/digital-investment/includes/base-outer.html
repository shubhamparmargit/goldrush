{% load static %}
<!DOCTYPE html>
<html lang="en">
	<head>
        <meta charset="utf-8">
        <!--[if IE]><meta http-equiv='X-UA-Compatible' content='IE=edge,chrome=1'><![endif]-->
        <title>GoldRush Aura - {% block pageTitle %}{% endblock %}</title>
        <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
		<link rel="stylesheet" href="{% static 'digital-investment/css/bootstrap.css' %}">
        <link rel="stylesheet" href="{% static 'digital-investment/css/styles.css' %}">
		<link rel="stylesheet" href="{% static 'digital-investment/css/ui.css' %}">
        <link rel="stylesheet" href="{% static 'digital-investment/icon/style.css' %}">
        <link rel="stylesheet" href="{% static 'digital-investment/font/fonts.css' %}">
        <link rel="shortcut icon" href="{% static 'website/images/favicon.png' %}">
		{% block extraCSS %}{% endblock %}
		<noscript>
			<meta http-equiv="refresh" content="0;url=/gold_mines/portal/middleware/javascript-disabled?next={{ request.path }}">
		</noscript>
	</head>
	<body>
		{% block content %}{% endblock %}
		<script>
            window.APP_URLS = {
                save_bank_data: "{% url 'saveCutomerBankDetails' %}",
                save_term_data: "{% url 'saveCutomerTermsDetails' %}",
            };
        </script>
		<script src="{% static 'digital-investment/js/jquery.min.js' %}"></script>
        <script src="{% static 'digital-investment/js/bootstrap.min.js' %}"></script>
        {% block extraJS %}{% endblock %}
	</body>
</html>
