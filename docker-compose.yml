version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: goldmine_mysql_db
    restart: always
    environment:
      MYSQL_DATABASE: ohwqiijn_gold_mine
      MYSQL_ROOT_PASSWORD: goldmine_secure_pass_123
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./ohwqiijn_gold_mine.sql:/docker-entrypoint-initdb.d/ohwqiijn_gold_mine.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  web:
    build: .
    container_name: goldmine_django_web
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./private:/app/private
      - ./staticfiles:/app/staticfiles
    environment:
      DB_NAME: ohwqiijn_gold_mine
      DB_USER: root
      DB_PASSWORD: goldmine_secure_pass_123
      DB_HOST: db
      DB_PORT: 3306
      DEBUG: "True"
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
